##### --- TPM --- #####
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'arcticicestudio/nord-tmux'   # Nord Theme
set -g @nord_tmux_show_status_content 0

##### --- PREFIX --- #####
unbind C-b
set -g prefix C-s
bind C-s send-prefix

##### --- SPLITS --- #####
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

##### --- PANE NAVIGATION (Vim style) --- #####
# Move between panes with Ctrl+s + h/j/k/l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### --- RESIZE PANES --- #####
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### --- POPUP MODAL --- #####
# Prefix + m opens a centered popup shell; exit/ctrl-d closes it.
bind m display-popup -E -w 80% -h 60% -d "#{pane_current_path}" -T "popup" /bin/zsh

##### --- QUALITY OF LIFE --- #####
set -g mouse on
set -g history-limit 10000
setw -g mode-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g escape-time 10

bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"

##### --- DIM INACTIVE PANES --- #####
set -g window-style "fg=colour248,bg=colour233"
set -g window-active-style "fg=colour247,bg=colour232"

##### --- STATUS LEFT --- #####
set -g status-left-length 80
set -g status-left '#[fg=black,bg=brightcyan,bold] #S #[default]  '
set -g window-status-format "#[fg=brightblack,bg=black]  #I:#W  #[default]"
set -g window-status-current-format "#[fg=black,bg=cyan,bold]  #I:#W  #[default]"
set -g window-status-style fg=brightblack,bg=black
set -g window-status-current-style fg=black,bg=cyan,bold

##### --- STATUS INFO --- #####
set -g status-right-length 120
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=black,bg=yellow,bold'
set -g @prefix_highlight_prefix_prompt 'PREFIX'
set -g @prefix_highlight_fg 'black'
set -g @prefix_highlight_bg 'brightcyan'
set -g @prefix_highlight_output_prefix ' '
set -g @prefix_highlight_output_suffix ' '
set -g status-right "#{prefix_highlight} #[fg=black,bg=brightcyan,bold] k8s #[fg=colour251,bg=colour237] #(kubectl config current-context 2>/dev/null || echo '-')#[default]  #[fg=black,bg=brightcyan,bold] kns #[fg=colour251,bg=colour237] #(kubectl config view --minify --output 'jsonpath={..namespace}' 2>/dev/null | awk 'length>0{print; exit} END{if(NR==0) print \"default\"}')#[default]  #[fg=black,bg=brightcyan,bold] dir #[fg=colour251,bg=colour237] #(basename \"#{pane_current_path}\")#[default]   "

##### --- RESURRECT/CONTINUUM --- #####
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'

##### --- LOAD TPM LAST --- #####
run '~/.tmux/plugins/tpm/tpm'
