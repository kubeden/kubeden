---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: a2w-trials-tls
  namespace: a2w-trials
spec:
  secretName: a2w-trials-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - trials.a2w.io
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: a2w-trials-gateway
  namespace: a2w-trials
  annotations:
    external-dns.alpha.kubernetes.io/hostname: "trials.a2w.io"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  gatewayClassName: traefik
  listeners:
    - name: https
      protocol: HTTPS
      port: 8443
      hostname: trials.a2w.io
      tls:
        mode: Terminate
        certificateRefs:
          - group: ''
            kind: Secret
            name: a2w-trials-tls
      allowedRoutes:
        namespaces:
          from: Same
---
# Path split: /api and /internal go to the Platform API, the rest to the web
# app. Gateway API gives longer prefixes precedence, so order is not load-bearing.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: a2w-trials
  namespace: a2w-trials
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: a2w-trials-gateway
      namespace: a2w-trials
  hostnames:
    - trials.a2w.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - group: ''
          kind: Service
          name: a2w-trials-api-service
          port: 80
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /internal
      backendRefs:
        - group: ''
          kind: Service
          name: a2w-trials-api-service
          port: 80
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ''
          kind: Service
          name: a2w-trials-web-service
          port: 80
          weight: 1
