apiVersion: v1
kind: ConfigMap
metadata:
  name: baldcheck-init-sql
  namespace: baldcheck
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS license_keys (
      id          UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      key         TEXT UNIQUE NOT NULL,
      created_at  TIMESTAMPTZ NOT NULL DEFAULT now(),
      source      TEXT NOT NULL,
      source_id   TEXT UNIQUE NOT NULL,
      is_gift     BOOLEAN NOT NULL DEFAULT true,
      redeemed    BOOLEAN NOT NULL DEFAULT false,
      redeemed_at TIMESTAMPTZ,
      redeemed_by TEXT,
      recipient_name TEXT,
      sender_name TEXT
    );
    CREATE INDEX IF NOT EXISTS idx_license_keys_key ON license_keys (key);
    CREATE INDEX IF NOT EXISTS idx_license_keys_source_id ON license_keys (source_id);

    CREATE TABLE IF NOT EXISTS baldchecks (
      id          UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      slug        TEXT UNIQUE NOT NULL,
      recipient   TEXT,
      sender      TEXT,
      x_handle    TEXT,
      x_avatar_b64 TEXT,
      source_id   TEXT,
      created_at  TIMESTAMPTZ NOT NULL DEFAULT now()
    );
    CREATE INDEX IF NOT EXISTS idx_baldchecks_slug ON baldchecks (slug);
    CREATE INDEX IF NOT EXISTS idx_baldchecks_created_at ON baldchecks (created_at DESC);
