---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: generalized
  namespace: generalized
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: generalized-gateway
      namespace: generalized
  hostnames:
    - generalized.dev
  rules:
    - backendRefs:
        - group: ''
          kind: Service
          name: generalized-service
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: generalized-www-redirect
  namespace: generalized
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: generalized-gateway
      namespace: generalized
  hostnames:
    - www.generalized.dev
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            hostname: generalized.dev
            statusCode: 301
      matches:
        - path:
            type: PathPrefix
            value: /
---
# api.generalized.dev is the agent-facing install host:
#   api.generalized.dev/install/{user}/{slug} → app /api/install/{user}/{slug}
# /api/* passes through untouched so URLs the manifests mint
# (origin + /api/install/...) resolve on this host too.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: generalized-api
  namespace: generalized
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: generalized-gateway
      namespace: generalized
  hostnames:
    - api.generalized.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /install
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api/install
      backendRefs:
        - group: ''
          kind: Service
          name: generalized-service
          port: 80
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - group: ''
          kind: Service
          name: generalized-service
          port: 80
          weight: 1
