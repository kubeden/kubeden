apiVersion: v1
kind: ConfigMap
metadata:
  name: ghostwrite-config
  namespace: ghostwrite
data:
  # Only truly-public, constant values live here (this repo may be public).
  # Everything with any sensitivity — including the Neon/S3 endpoint hostnames —
  # is in the sealed secret (ghostwrite-secrets), also loaded via envFrom.
  #
  # NEXT_PUBLIC_APP_URL is ALSO baked into the client bundle at build time (CI
  # build-arg); this runtime copy keeps server-side reads consistent.
  NEXT_PUBLIC_APP_URL: "https://bettercalldenis.com"
  EMAIL_FROM: "Ghostwriter <hello@bettercalldenis.com>"
