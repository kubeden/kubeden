apiVersion: apps/v1
kind: Deployment
metadata:
  name: globchess
  namespace: globchess
  labels:
    app: globchess
spec:
  # Pinned at 1 until a Redis Socket.io adapter is added — broadcasts
  # only reach clients on the same pod without one, so scaling out would
  # silo the realtime layer.
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: globchess
  template:
    metadata:
      labels:
        app: globchess
    spec:
      # Two init containers run in order before the app boots:
      #   1. wait-for-db — blocks until postgres is accepting connections
      #   2. migrate     — runs `prisma migrate deploy` + seed (idempotent)
      initContainers:
        - name: wait-for-db
          image: postgres:17-alpine
          command:
            - /bin/sh
            - -c
            - |
              until pg_isready -h globchess-db -p 5432 -U "$POSTGRES_USER"; do
                echo "waiting for globchess-db…"; sleep 2
              done
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: globchess-secrets
                  key: POSTGRES_USER
        - name: migrate
          image: registry.k6nis.dev/globchess/webapp:latest
          imagePullPolicy: Always
          workingDir: /app
          # DEBUG MODE — stays alive for 1h after diagnostics so we can
          # `kubectl exec` into it regardless of what fails. Restore the
          # real migrate command once we know the root cause.
          command:
            - /bin/sh
            - -c
            - |
              set +e
              exec 2>&1
              echo "=== start $(date) ==="
              echo "--- uname ---"
              uname -a
              echo "--- id ---"
              id
              echo "--- pwd ---"
              pwd
              echo "--- node ---"
              command -v node && node --version
              echo "--- ls /app ---"
              ls -la /app 2>&1 | head -40
              echo "--- ls /app/node_modules (top 30) ---"
              ls /app/node_modules 2>&1 | head -30
              echo "--- prisma CLI script ---"
              ls -la /app/node_modules/prisma/build/index.js 2>&1
              echo "--- @prisma ---"
              ls /app/node_modules/@prisma 2>&1
              echo "--- .prisma ---"
              ls /app/node_modules/.prisma 2>&1
              echo "--- prisma schema dir ---"
              ls -la /app/prisma 2>&1
              echo "--- DATABASE_URL masked ---"
              printenv DATABASE_URL | sed 's|://[^@]*@|://***:***@|'
              echo "--- env keys ---"
              printenv | cut -d= -f1 | sort
              echo "--- attempt migrate deploy ---"
              node /app/node_modules/prisma/build/index.js migrate deploy
              echo "--- migrate exit: $? ---"
              echo "--- attempt seed ---"
              node /app/prisma/seed.mjs
              echo "--- seed exit: $? ---"
              echo "=== sleeping 3600s for exec debugging ==="
              sleep 3600
          envFrom:
            - configMapRef:
                name: globchess-config
            - secretRef:
                name: globchess-secrets
      containers:
        - name: globchess
          image: registry.k6nis.dev/globchess/webapp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: globchess-config
            - secretRef:
                name: globchess-secrets
          readinessProbe:
            httpGet:
              path: /api/version
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/version
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
