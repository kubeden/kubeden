apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: md
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kubeden/kubeden.git
    targetRevision: main
    path: k8s-cluster-configuration/applications/md/base
  destination:
    server: https://kubernetes.default.svc
    namespace: md
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
