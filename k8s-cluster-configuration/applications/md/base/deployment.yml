apiVersion: apps/v1
kind: Deployment
metadata:
  name: md
  labels:
    app: md
spec:
  replicas: 1
  selector:
    matchLabels:
      app: md
  template:
    metadata:
      labels:
        app: md
      annotations:
        txtwrite.k6nis.dev/image-sha: "3625cfd8b947ea8348e1b5103e09549f33f032f1"
    spec:
      containers:
      - name: md
        image: registry.k6nis.dev/txtwrite/neon:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 4173
