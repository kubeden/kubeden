---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: md-pr-9-tls
  namespace: md-pr-9
spec:
  secretName: md-pr-9-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "md-pr-9.k6nis.dev"
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: md-pr-9-gateway
  namespace: md-pr-9
  annotations:
    external-dns.alpha.kubernetes.io/hostname: "md-pr-9.k6nis.dev"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  gatewayClassName: traefik
  listeners:
    - name: https
      protocol: HTTPS
      port: 8443
      hostname: "md-pr-9.k6nis.dev"
      tls:
        mode: Terminate
        certificateRefs:
          - group: ''
            kind: Secret
            name: md-pr-9-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: md-pr-9
  namespace: md-pr-9
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: md-pr-9-gateway
      namespace: md-pr-9
  hostnames:
    - "md-pr-9.k6nis.dev"
  rules:
    - backendRefs:
        - group: ''
          kind: Service
          name: md-pr-9-service
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
