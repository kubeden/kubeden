apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notate
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kubeden/kubeden.git
    targetRevision: main
    path: k8s-cluster-configuration/applications/notate/base
  destination:
    server: https://kubernetes.default.svc
    namespace: notate
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
