apiVersion: apps/v1
kind: Deployment
metadata:
  name: trials
  namespace: trials
  labels:
    app: trials
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trials
  template:
    metadata:
      labels:
        app: trials
    spec:
      containers:
      - name: trials
        # CI (a2w trials repo, .github/workflows/build-web.yml) pushes
        # :latest and :sha-<commit> on every push to main.
        # Pin a sha tag here and bump it to roll out a new version.
        image: registry.k6nis.dev/a2w/trials-web:latest
        ports:
        - containerPort: 3000
