apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

# resources:
#   - gateway.yml

helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: 9.0.1
    releaseName: argocd
    namespace: argocd
    includeCRDs: true
    valuesFile: values.yml