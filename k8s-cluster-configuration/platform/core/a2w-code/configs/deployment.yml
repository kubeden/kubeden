apiVersion: apps/v1
kind: Deployment
metadata:
  name: a2w-codex-terraform
  namespace: a2w-codex-terraform
  labels:
    app: a2w-codex-terraform
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: a2w-codex-terraform
  template:
    metadata:
      labels:
        app: a2w-codex-terraform
    spec:
      serviceAccountName: a2w-codex-terraform
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: web
          image: registry.k6nis.dev/a2w/codex-terraform:sha-cbbc4d4b32c3
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5173
          env:
            - name: A2W_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - configMapRef:
                name: a2w-codex-terraform-config
            - secretRef:
                name: a2w-codex-terraform-secrets
          volumeMounts:
            - name: data
              mountPath: /app/.data
            - name: codex-auth
              mountPath: /home/node/.codex
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /auth
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /auth
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: a2w-codex-terraform-data
        - name: codex-auth
          persistentVolumeClaim:
            claimName: a2w-codex-terraform-codex
