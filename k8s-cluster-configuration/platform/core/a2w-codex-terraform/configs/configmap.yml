apiVersion: v1
kind: ConfigMap
metadata:
  name: a2w-codex-terraform-config
  namespace: a2w-codex-terraform
data:
  NODE_ENV: "production"
  PORT: "5173"
  HOSTNAME: "0.0.0.0"
  A2W_OPERATOR_NAME: "Platform Operator"
  A2W_WORKSPACE_NAME: "Kubeden Platform"
  A2W_DEFAULT_CLOUD: "azure"
  A2W_AGENT_BACKEND: "codex"
  A2W_CODEX_TIMEOUT_MS: "180000"
  A2W_SANDBOX_BACKEND: "kubernetes"
  A2W_K8S_DATA_PVC: "a2w-codex-terraform-data"
  A2W_K8S_SANDBOX_SERVICE_ACCOUNT: "default"
  A2W_K8S_SANDBOX_IMAGE_PULL_POLICY: "Always"
  A2W_SANDBOX_IMAGE: "registry.k6nis.dev/a2w/infra-sandbox:v0.0.1"
  A2W_ENABLE_TERRAFORM_APPLY: "false"
