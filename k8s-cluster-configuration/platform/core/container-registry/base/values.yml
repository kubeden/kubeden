mountConfig: true
mountSecret: true

service:
  type: ClusterIP
  port: 5000

env:
  - name: AWS_ACCESS_KEY_ID
    valueFrom:
      secretKeyRef:
        name: registry-s3-credentials
        key: accessKey
  - name: AWS_SECRET_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: registry-s3-credentials
        key: secretKey

secretFiles:
  htpasswd: |-
    admin:$2y$05$hwKOg7L.euzJkgfM2NKpJeJ0FskmH9AYccbPoc9pUU9s7u7Ljuk8C

configFiles:
  config.json: |-
    {
      "distSpecVersion": "1.1.1",
      "storage": {
        "rootDirectory": "/tmp/zot",
        "dedupe": false,
        "storageDriver": {
          "name": "s3",
          "region": "fsn1",
          "regionendpoint": "https://fsn1.your-objectstorage.com",
          "bucket": "kubeden",
          "rootdirectory": "/infra/zot",
          "secure": true,
          "skipverify": false,
          "forcepathstyle": true
        }
      },
      "http": {
        "address": "0.0.0.0",
        "port": "5000",
        "auth": {
          "htpasswd": {
            "path": "/secret/htpasswd"
          }
        },
        "accessControl": {
          "repositories": {
            "**": {
              "policies": [
                {
                  "users": ["admin"],
                  "actions": ["read", "create", "update", "delete"]
                }
              ],
              "defaultPolicy": []
            }
          },
          "adminPolicy": {
            "users": ["admin"],
            "actions": ["read", "create", "update", "delete"]
          }
        }
      },
      "extensions": {
        "ui": {
          "enable": true
        },
        "search": {
          "enable": true
        }
      },
      "log": {
        "level": "info"
      }
    }

resources:
  requests:
    cpu: 10m
    memory: 64Mi
