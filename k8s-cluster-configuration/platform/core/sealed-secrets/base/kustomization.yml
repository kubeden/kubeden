apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: sealed-secrets
    # Project moved from the bitnami-labs org to bitnami on 2026-06-15; the old
    # GitHub Pages chart URL 404s (git redirects, Pages does not).
    repo: https://bitnami.github.io/sealed-secrets
    version: 2.17.1
    releaseName: sealed-secrets
    namespace: sealed-secrets
    includeCRDs: true
    valuesFile: values.yml
