deployment:
  replicas: 1

ingressClass:
  enabled: true
  isDefaultClass: true

ingressRoute:
  dashboard:
    enabled: false

providers:
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
  kubernetesIngress:
    enabled: true
    publishedService:
      enabled: true

ports:
  web:
    redirections:
      entryPoint:
        to: websecure
        scheme: https
  websecure:
    tls:
      enabled: true

resources:
  requests:
    cpu: 10m
    memory: 32Mi

logs:
  general:
    level: INFO
