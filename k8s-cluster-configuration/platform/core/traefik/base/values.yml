deployment:
  replicas: 1

ingressClass:
  enabled: false

ingressRoute:
  dashboard:
    enabled: false

providers:
  kubernetesCRD:
    enabled: false
  kubernetesIngress:
    enabled: false
  kubernetesGateway:
    enabled: true

gateway:
  enabled: true

ports:
  web:
    redirections:
      entryPoint:
        to: websecure
        scheme: https
  websecure:
    tls:
      enabled: true

resources:
  requests:
    cpu: 10m
    memory: 32Mi

logs:
  general:
    level: INFO
