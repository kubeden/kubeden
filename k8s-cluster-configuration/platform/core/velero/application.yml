apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kubeden/kubeden.git
    targetRevision: main
    # Single source dir inflates BOTH the velero server (core/) and
    # velero-ui (ui/) helm charts via the top-level kustomization.
    path: k8s-cluster-configuration/platform/core/velero
  destination:
    server: https://kubernetes.default.svc
    # The helm charts declare their own namespaces (velero and velero-ui);
    # this is just the default anchor for the Argo Application itself.
    namespace: velero
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - .spec.conversion
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
      - ServerSideApply=true
