# -----------------------------------------------------------------------------
# PLAIN Secret TEMPLATE — seal before committing.
#
# The Velero helm chart reads credentials from a Secret with a single key
# named "cloud" whose value is an AWS-style INI credentials file. Below is
# the raw template; run it through kubeseal and commit ONLY the sealed form.
#
# Steps:
#   1. Hetzner Console → Object Storage → create a bucket named
#      "kubeden-backups" in region nbg1
#   2. Create an access key scoped to that bucket
#   3. Build + seal the secret with kubeseal:
#
#   kubectl create secret generic velero-hetzner-credentials \
#       --namespace=velero \
#       --from-literal=cloud="$(cat <<'EOF'
#   [default]
#   aws_access_key_id = <HETZNER_ACCESS_KEY>
#   aws_secret_access_key = <HETZNER_SECRET_KEY>
#   EOF
#   )" \
#       --dry-run=client -o yaml \
#     | kubeseal \
#         --controller-namespace=sealed-secrets \
#         --controller-name=sealed-secrets-controller \
#         --format=yaml \
#     > k8s-cluster-configuration/platform/core/velero/core/hetzner-credentials-sealed.yml
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: velero-hetzner-credentials
  namespace: velero
type: Opaque
stringData:
  cloud: |
    [default]
    aws_access_key_id = CHANGE_ME_HETZNER_ACCESS_KEY
    aws_secret_access_key = CHANGE_ME_HETZNER_SECRET_KEY
