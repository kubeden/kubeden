---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: registry-tls
  namespace: zot
spec:
  secretName: registry-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - registry.k6nis.dev
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: registry-gateway
  namespace: zot
  annotations:
    external-dns.alpha.kubernetes.io/hostname: "registry.k6nis.dev"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
spec:
  gatewayClassName: traefik
  listeners:
    - name: https
      protocol: HTTPS
      port: 8443
      hostname: registry.k6nis.dev
      tls:
        mode: Terminate
        certificateRefs:
          - group: ''
            kind: Secret
            name: registry-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: registry
  namespace: zot
  annotations:
    # external-dns's gateway-httproute source reads annotations from the
    # HTTPRoute, not the parent Gateway, so the proxied=false override
    # MUST live here. Global default is --cloudflare-proxied (set true
    # in platform/core/external-dns/base/values.yml) for public apps,
    # so internal hosts like the registry need an explicit opt-out or
    # Cloudflare's 100 MB upload limit blocks image pushes.
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: registry-gateway
      namespace: zot
  hostnames:
    - registry.k6nis.dev
  rules:
    - backendRefs:
        - group: ''
          kind: Service
          name: zot
          port: 5000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
